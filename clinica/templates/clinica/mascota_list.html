{% extends 'clinica/base.html' %}
{% block content %}
<h2>Listado de Mascotas</h2>
<a href="{% url 'mascota_create' %}" class="btn btn-primary mb-3">Añadir Mascota</a>
<ul class="list-group mb-3">
    {% for mascota in page_obj %}
        <li class="list-group-item"><a href="{% url 'mascota_detail' mascota.pk %}">{{ mascota.nombre }} ({{ mascota.especie }})</a></li>
    {% empty %}
        <li class="list-group-item">No hay mascotas.</li>
    {% endfor %}
</ul>
{% endblock %}
